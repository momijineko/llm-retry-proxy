<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>号池管理 · llm-retry-proxy</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#fff; --card-2:#f8fafc; --border:#e2e7ee; --border-strong:#cbd3df;
      --text:#0f172a; --text-2:#334155; --muted:#6b7280; --muted-2:#9ca3af;
      --primary:#2563eb; --primary-d:#1d4ed8; --primary-l:#eff6ff;
      --ok:#10b981; --ok-l:#ecfdf5; --ok-d:#047857;
      --warn:#f59e0b; --warn-l:#fffbeb; --warn-d:#b45309;
      --danger:#ef4444; --danger-l:#fef2f2; --danger-d:#b91c1c;
      --radius:8px; --radius-sm:8px; --radius-xs:6px;
      --shadow-xs:0 1px 2px rgba(15,23,42,.04);
      --shadow:0 1px 3px rgba(15,23,42,.05),0 1px 2px rgba(15,23,42,.03);
      --shadow-md:0 4px 12px -2px rgba(15,23,42,.08),0 2px 6px -2px rgba(15,23,42,.04);
      --shadow-lg:0 12px 32px -8px rgba(15,23,42,.12),0 4px 12px -4px rgba(15,23,42,.06);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:14px}
    button,input,select{font:inherit;color:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.55}

    header{background:rgba(255,255,255,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;flex-wrap:wrap}
    header .brand{display:flex;align-items:center;gap:10px}
    header .logo{width:30px;height:30px;border-radius:7px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;box-shadow:0 2px 6px rgba(37,99,235,.24)}
    header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:0}
    header .sub{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
    header .sub .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(16,185,129,.15);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    header .spacer{flex:1}
    .app-nav{display:flex;align-items:center;gap:4px;margin-left:12px}
    .app-nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;font-size:13px;font-weight:500;transition:color .15s,background .15s}
    .app-nav a:hover{background:var(--card-2);color:var(--text)}
    .app-nav a.active{background:var(--primary-l);color:var(--primary-d)}
    .header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .interval-control{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
    .interval-control input{width:72px;height:34px;border:1px solid var(--border);border-radius:var(--radius-xs);padding:0 8px;color:var(--text);background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s}
    .interval-control input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}

    main{width:100%;max-width:1680px;margin:0 auto;padding:24px 28px 56px}

    .btn{min-height:34px;padding:0 13px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--card);color:var(--text-2);font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l);box-shadow:var(--shadow-xs)}
    .btn:active{transform:translateY(1px)}
    .btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.primary:hover{background:var(--primary-d);border-color:var(--primary-d);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
    .btn.info{background:var(--primary-l);border-color:#bfdbfe;color:var(--primary-d)}
    .btn.info:hover{background:#dbeafe;border-color:#93c5fd;color:var(--primary-d)}
    .btn.success{background:var(--ok-l);border-color:#a7f3d0;color:var(--ok-d)}
    .btn.success:hover{background:#d1fae5;border-color:#6ee7b7;color:var(--ok-d)}
    .btn.warning{background:var(--warn-l);border-color:#fde68a;color:var(--warn-d)}
    .btn.warning:hover{background:#fef3c7;border-color:#fcd34d;color:var(--warn-d)}
    .btn.danger{color:var(--danger-d)}
    .btn.danger:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-l)}

    .notice{display:none;margin-bottom:14px;padding:10px 14px;border-radius:var(--radius-xs);border:1px solid;font-size:13px}
    .notice.show{display:block}
    .notice.ok{color:var(--ok-d);background:var(--ok-l);border-color:#a7f3d0}
    .notice.warn{color:var(--warn-d);background:var(--warn-l);border-color:#fde68a}
    .notice.error{color:var(--danger-d);background:var(--danger-l);border-color:#fecaca}

    .connect{display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;padding:20px;box-shadow:var(--shadow)}
    .connect.open{display:block}
    .connect h2{font-size:13px;margin:0 0 16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:0}
    .connect h2::before{content:"";width:3px;height:14px;border-radius:2px;background:var(--primary);flex-shrink:0}
    .form-grid{display:grid;grid-template-columns:180px minmax(260px,1fr) 180px 180px;gap:12px}
    .field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px;font-weight:500}
    .field input,.field select{width:100%;height:38px;border:1px solid var(--border-strong);border-radius:var(--radius-xs);background:var(--card);padding:0 10px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .credentials{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px;margin-top:12px}
    .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

    .empty{padding:70px 20px;text-align:center;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:var(--radius);font-size:13px}
    .source-list{display:grid;gap:14px}
    .source{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
    .source:hover{box-shadow:var(--shadow-md)}
    .source-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border)}
    .source-title{min-width:0}
    .source-title strong{display:block;font-size:15px;font-weight:700;color:var(--text)}
    .source-title span{display:block;color:var(--muted);font-size:12px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .source-actions{margin-left:auto;display:flex;gap:8px;flex:0 0 auto;flex-wrap:wrap}
    .source-actions .btn.danger{background:var(--danger-l);border-color:#fecaca;color:var(--danger-d)}
    .source-actions .btn.danger:hover{background:#fee2e2;border-color:#fca5a5;color:var(--danger-d)}
    .source-policy{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--card-2);flex-wrap:wrap}
    .source-policy>label{color:var(--muted);font-size:12px;font-weight:600}
    .segmented{display:inline-flex;border:1px solid var(--border-strong);border-radius:var(--radius-xs);overflow:hidden;background:var(--card)}
    .segmented button{height:32px;padding:0 12px;border:0;border-right:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
    .segmented button:last-child{border-right:0}.segmented button.active{background:var(--primary);color:#fff}
    .target-control{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
    .target-control input{width:72px;height:32px;border:1px solid var(--border-strong);border-radius:var(--radius-xs);padding:0 8px;background:var(--card)}
    .target-control input.model-input{width:180px}
    .policy-thresholds{color:var(--text-2);font-size:12px;font-variant-numeric:tabular-nums}

    .pill{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.02em}
    .pill.ok{background:var(--ok-l);color:var(--ok-d)}
    .pill.muted{background:var(--card-2);color:var(--muted)}
    .pill.warn{background:var(--warn-l);color:var(--warn-d)}

    .source-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .metric{background:var(--card);padding:14px 18px}
    .metric label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.03em}
    .metric span{font-weight:700;font-size:14px;color:var(--text);font-variant-numeric:tabular-nums}
    .source-error{color:var(--danger-d);background:var(--danger-l);padding:10px 18px;border-bottom:1px solid #fecaca;font-size:12px}
    .scheduler{border-bottom:1px solid var(--border)}
    .scheduler-head{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--card-2);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
    .scheduler .table-wrap{max-height:260px}
    .scheduler table{min-width:680px}
    .workload{display:flex;align-items:center;gap:7px}.workload code{font-size:11px;color:var(--text-2)}
    .state-detail{color:var(--muted);font-size:11px;margin-left:5px}

    .table-wrap{overflow:auto;max-height:520px}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:760px}
    th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
    th{position:sticky;top:0;background:var(--card-2);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;z-index:1}
    th .sort-head{border:0;background:transparent;padding:0;color:inherit;font:inherit;cursor:pointer}
    th .sort-head:hover,th .sort-head.active{color:var(--primary)}
    th .sort-icon{margin-left:4px;color:var(--primary)}
    td.num,th.num{text-align:right}
    tbody tr{transition:background .12s}
    tbody tr:hover{background:var(--primary-l)}
    tbody tr:last-child td{border-bottom:0}
    .rules{color:var(--muted);font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis}
    .capabilities{min-width:220px;max-width:360px;white-space:normal;line-height:1.55;overflow-wrap:anywhere}
    .capabilities div+div{margin-top:4px}
    .rejected-model{color:var(--danger-d);text-decoration:line-through;text-decoration-thickness:1.5px}
    .cooled{color:var(--warn-d);font-weight:600}.disabled-key{color:var(--muted);background:var(--card-2)}
    .key-actions{display:flex;align-items:center;gap:12px}
    .text-action{padding:0;border:0;background:transparent;color:var(--primary);font-size:12px;line-height:1.5;cursor:pointer}
    .text-action:hover{color:var(--primary-d);text-decoration:underline;text-underline-offset:2px}
    .text-action.danger{color:var(--danger-d)}
    .text-action.danger:hover{color:var(--danger)}
    .rule-input{width:190px;max-width:100%;height:32px;border:1px solid var(--border-strong);border-radius:var(--radius-xs);padding:0 10px;font-size:12px;color:var(--text);background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s}
    .rule-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .rule-input::placeholder{color:var(--muted-2)}

    .modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(15,23,42,.42);padding:24px;align-items:center;justify-content:center}
    .modal.open{display:flex}
    .dialog{width:min(980px,100%);max-height:min(760px,calc(100vh - 48px));display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden}
    .dialog-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
    .dialog-head h2{font-size:15px;margin:0;font-weight:700}
    .dialog-head button{margin-left:auto}
    .group-tools{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--card-2)}
    .group-tools .field{width:min(280px,100%)}
    .group-table{overflow:auto;min-height:220px}
    .group-table table{min-width:620px}
    .group-table input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary)}
    .dialog-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--border);background:var(--card)}
    .dialog-actions .summary{margin-right:auto;color:var(--muted);font-size:12px}
    .operation-progress{color:var(--primary);font-size:12px;margin-right:auto}
    .dialog-actions .operation-progress+.btn{margin-left:0}

    @media(max-width:1050px){.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:820px){header{padding:10px 16px;gap:8px}.header-actions{width:100%}main{padding:16px 16px 40px}}
    @media(max-width:760px){.form-grid,.credentials{grid-template-columns:1fr}.header-actions{flex-wrap:wrap}.source-head{align-items:flex-start;flex-wrap:wrap}.source-actions{width:100%;margin-left:0;flex-wrap:wrap}.source-meta{grid-template-columns:repeat(2,1fr)}.modal{padding:10px}.group-tools{flex-direction:column;align-items:stretch}.group-tools .field{width:100%}.dialog-actions{flex-wrap:wrap}.dialog-actions .summary{width:100%;margin:0}}
  </style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">R</div>
    <div>
      <h1>号池管理</h1>
      <span class="sub"><span class="dot"></span>上游号池连接与 Key 管理</span>
    </div>
  </div>
  <nav class="app-nav" aria-label="主导航"><a href="/stats">统计</a><a href="/logs">日志</a><a class="active" href="/key-pools">号池</a></nav>
  <div class="spacer"></div>
  <div class="header-actions">
    <label class="interval-control">同步周期 <input id="syncInterval" type="number" min="0" max="86400" step="1"> 秒</label>
    <button class="btn" id="saveInterval">保存周期</button>
    <button class="btn" id="syncAll">立即同步</button>
    <button class="btn primary" id="addSource">添加上游</button>
  </div>
</header>
<main>
  <div class="notice" id="notice"></div>
  <section class="connect" id="connectPanel">
    <h2>添加上游连接</h2>
    <form id="connectForm">
      <div class="form-grid">
        <div class="field"><label for="adapter">适配器</label><select id="adapter" required></select></div>
        <div class="field"><label for="baseUrl">上游地址</label><input id="baseUrl" type="url" required></div>
        <div class="field"><label for="routePrefix">代理前缀</label><input id="routePrefix" placeholder="/example" required></div>
        <div class="field"><label for="provider">Provider</label><input id="provider"></div>
      </div>
      <div class="credentials" id="credentials"></div>
      <div class="form-actions"><button class="btn" type="button" id="cancelConnect">取消</button><button class="btn primary" type="submit" id="connectSubmit">连接并同步</button></div>
    </form>
  </section>
  <div id="content"><div class="empty">正在载入</div></div>
</main>
<div class="modal" id="groupModal" role="dialog" aria-modal="true" aria-labelledby="groupDialogTitle">
  <section class="dialog">
    <div class="dialog-head"><h2 id="groupDialogTitle">选择分组</h2><button class="btn" id="closeGroups" type="button">关闭</button></div>
    <div class="group-tools">
      <button class="btn" id="selectMissing" type="button">选择缺失分组</button>
      <button class="btn" id="selectAllGroups" type="button">全选</button>
    </div>
    <div class="group-table" id="groupTable"><div class="empty">正在载入</div></div>
    <div class="dialog-actions"><span class="summary" id="groupSummary"></span><span class="operation-progress" id="operationProgress" aria-live="polite"></span><button class="btn danger" id="clearSelected" type="button">清空选中分组</button><button class="btn" id="createMissing" type="button">一键补齐</button><button class="btn primary" id="createSelected" type="button">为选中分组创建 Key</button></div>
  </section>
</div>
<div class="modal" id="mappingModal" role="dialog" aria-modal="true" aria-labelledby="mappingDialogTitle">
  <section class="dialog">
    <div class="dialog-head"><h2 id="mappingDialogTitle">分组路由映射</h2><button class="btn" id="closeMapping" type="button">关闭</button></div>
    <div class="group-table" id="mappingTable"><div class="empty">正在载入</div></div>
    <div class="dialog-actions"><span class="summary">自动能力是硬约束；手工模型和路径规则只会进一步收窄候选</span><button class="btn primary" id="saveGroupRules" type="button">保存映射</button></div>
  </section>
</div>
<script>
const $=id=>document.getElementById(id);let state={adapters:[],sources:[],defaults:{}},activeSource='',groupCatalog=[],keySortMode='default',keySortDirection=1;const activeChecks=new Set();
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function notice(message,type='ok'){const el=$('notice');el.textContent=message;el.className='notice show '+type;clearTimeout(el.timer);el.timer=setTimeout(()=>el.className='notice',5000)}
function fmtTime(v){if(!v)return '尚未同步';const d=new Date(v);return Number.isNaN(d.getTime())?v:d.toLocaleString()}
function fmtEpoch(v){if(!v)return '-';const d=new Date(Number(v)*1000);return Number.isNaN(d.getTime())?'-':d.toLocaleString()}
async function api(path,options={}){const endpoint=new URL('/admin/key-pools/api/'+path,window.location.origin);const response=await fetch(endpoint.toString(),{headers:{'Content-Type':'application/json'},...options});let data={};try{data=await response.json()}catch{}if(!response.ok)throw new Error(data.detail||data.message||('HTTP '+response.status));return data}
function renderCredentialFields(){const adapter=state.adapters.find(a=>a.name===$('adapter').value);$('credentials').innerHTML=(adapter?.credential_fields||[]).map(field=>`<div class="field"><label for="cred_${esc(field.name)}">${esc(field.label)}</label><input id="cred_${esc(field.name)}" data-credential="${esc(field.name)}" type="${esc(field.type||'text')}" required autocomplete="${field.type==='password'?'current-password':'off'}"></div>`).join('')}
function configureForm(){const adapters=state.adapters||[];$('adapter').innerHTML=adapters.map(a=>`<option value="${esc(a.name)}">${esc(a.label)}</option>`).join('');$('adapter').value=state.defaults?.adapter||adapters[0]?.name||'';$('baseUrl').value='';$('routePrefix').value='';$('provider').value='';renderCredentialFields()}
function supports(source,capability){const adapter=state.adapters.find(a=>a.name===source.adapter);return(adapter?.capabilities||[]).includes(capability)}
function sortHead(label,mode,num=false){const active=keySortMode===mode;const arrow=active?(keySortDirection===1?'↑':'↓'):'↕';return `<th${num?' class="num"':''}><button type="button" class="sort-head${active?' active':''}" data-sort="${mode}">${label}<span class="sort-icon">${arrow}</span></button></th>`}
function capabilityParts(item){const c=item.routing_capabilities||{},parts=[];if((c.endpoint_families||[]).length)parts.push('端点: '+c.endpoint_families.join(', '));if((c.model_patterns||[]).length)parts.push('模型: '+c.model_patterns.join(', '));else if(c.model_list_known)parts.push('模型: 无');if((c.model_scopes||[]).length)parts.push('范围: '+c.model_scopes.join(', '));return parts}
function capabilityText(item){return capabilityParts(item).join('; ')}
function isImageModel(model){const value=String(model||'').toLowerCase();return /^(gpt-image-|image|imagen|nano-banana)/.test(value)||value.startsWith('gemini')&&/(image|imagen|nano-banana)/.test(value)}
function capabilityMarkup(item){const c=item.routing_capabilities||{},parts=[];if((c.endpoint_families||[]).length)parts.push(`<div>端点: ${esc(c.endpoint_families.join(', '))}</div>`);if((c.model_patterns||[]).length){const rejected=new Set((c.rejected_models||[]).map(model=>String(model).toLowerCase())),models=c.model_patterns.map(model=>{const learned=rejected.has(String(model).toLowerCase()),noPermission=isImageModel(model)&&!c.image_generation,disabled=learned||noPermission,reason=learned?'真实请求已确认该分组不支持':noPermission?'分组未开启生图权限':'';return `<span class="${disabled?'rejected-model':''}"${reason?` title="${reason}"`:''}>${esc(model)}</span>`}).join(', ');parts.push(`<div>模型: ${models}</div>`)}else if(c.model_list_known)parts.push('<div>模型: 无</div>');if((c.model_scopes||[]).length)parts.push(`<div>范围: ${esc(c.model_scopes.join(', '))}</div>`);return parts.length?parts.join(''):'-'}
function latencyMarkup(k){const real=k.ttft_ewma==null?'-':Number(k.ttft_ewma).toFixed(2)+' s',probe=k.probe_latency_s==null?'-':Number(k.probe_latency_s).toFixed(2)+' s';return `<div title="真实请求 ${k.ttft_samples||0} 个样本，最近 ${esc(fmtEpoch(k.ttft_last_ts))}"><strong>真实 ${real}</strong>${k.ttft_stale?' <span class="pill warn">旧</span>':''}</div><div class="state-detail" title="最近检测 ${esc(fmtEpoch(k.probe_last_ts))}">检测响应 ${probe}</div>`}
function keyRows(keys,sourceId){

  const ordered=[...keys];
  ordered.sort((a,b)=>{let result=0;if(keySortMode==='group')result=String(a.group_name||'').localeCompare(String(b.group_name||''),'zh-CN')||String(a.label||'').localeCompare(String(b.label||''),'zh-CN');if(keySortMode==='rate'){const ar=Number.parseFloat(a.sort),br=Number.parseFloat(b.sort),av=Number.isFinite(ar)?ar:Number.POSITIVE_INFINITY,bv=Number.isFinite(br)?br:Number.POSITIVE_INFINITY;result=av-bv||String(a.group_name||'').localeCompare(String(b.group_name||''),'zh-CN')||String(a.label||'').localeCompare(String(b.label||''),'zh-CN')}return result*keySortDirection});
  return ordered.map(k=>{
    const automatic=capabilityText(k),rules=[...(k.models||[]),...(k.paths||[])].join('; '),minutes=Math.max(1,Math.ceil((k.cooldown_remaining||0)/60));

    return `<tr class="${k.enabled?'':'disabled-key'}"><td><strong>${esc(k.label)}</strong></td><td>${esc(k.key_masked)}</td><td>${esc(k.group_name||'-')}</td><td>${esc(k.platform||'-')}</td><td class="num">${esc(k.sort||'-')}</td><td class="num" data-latency-source="${esc(sourceId)}" data-latency-key="${esc(k.source_key_id)}">${latencyMarkup(k)}</td><td class="rules capabilities" title="${esc(automatic)}">${capabilityMarkup(k)}</td><td class="rules" title="${esc(rules)}">${esc(rules||'-')}</td><td class="${k.cooled?'cooled':''}">${status}</td><td><div class="key-actions">${actions}</div></td></tr>`
  }).join('')
}
function schedulerTable(s){

$('content').addEventListener('click',async e=>{const button=e.target.closest('button[data-reset-group]');if(!button)return;button.disabled=true;try{state=await api('reset-group',{method:'POST',body:JSON.stringify({source_id:button.dataset.sourceId,group_id:button.dataset.resetGroup})});render();notice('分组已解除熔断')}catch(err){notice(err.message,'error');button.disabled=false}});
$('closeGroups').addEventListener('click',()=>$('groupModal').classList.remove('open'));
$('closeMapping').addEventListener('click',()=>$('mappingModal').classList.remove('open'));
$('groupModal').addEventListener('click',e=>{if(e.target===$('groupModal')&&!$('groupModal').dataset.busy)$('groupModal').classList.remove('open')});
$('mappingModal').addEventListener('click',e=>{if(e.target===$('mappingModal'))$('mappingModal').classList.remove('open')});
$('selectMissing').addEventListener('click',()=>document.querySelectorAll('[data-group-id]').forEach(input=>input.checked=input.dataset.missing==='1'));
$('selectAllGroups').addEventListener('click',()=>document.querySelectorAll('[data-group-id]').forEach(input=>input.checked=true));
$('createMissing').addEventListener('click',()=>createKeys(true));
$('clearSelected').addEventListener('click',()=>{const ids=[...document.querySelectorAll('[data-group-id]:checked')].map(input=>input.dataset.groupId);if(!ids.length){notice('请选择至少一个分组','error');return}if(confirm(`确定清空选中的 ${ids.length} 个分组中的全部 Key 吗？此操作会删除上游 Key，无法撤销。`))clearKeys(ids)});
$('createSelected').addEventListener('click',()=>{const ids=[...document.querySelectorAll('[data-group-id]:checked')].map(input=>input.dataset.groupId);if(!ids.length){notice('请选择至少一个分组','error');return}createKeys(false,ids)});
load();setInterval(refreshRuntime,5000);
</script>
</body>
</html>
