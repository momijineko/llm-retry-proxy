<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>号池管理</title>
  <style>
    :root{--bg:#f5f7fa;--panel:#fff;--text:#172033;--muted:#667085;--border:#dfe3e8;--primary:#2563eb;--primary-bg:#eff6ff;--ok:#15803d;--ok-bg:#f0fdf4;--warn:#a16207;--warn-bg:#fffbeb;--danger:#b42318;--danger-bg:#fff1f0}
    *{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:var(--text);font:14px system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0;-webkit-font-smoothing:antialiased}
    button,input,select{font:inherit;letter-spacing:0}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.55}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px max(20px,calc((100% - 1240px)/2));display:flex;align-items:center;gap:14px;min-height:58px}
    .brand{display:flex;align-items:center;gap:10px}.logo{width:30px;height:30px;border-radius:7px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;box-shadow:0 2px 6px rgba(37,99,235,.24)}.brand-text h1{font-size:16px;margin:0;font-weight:700;letter-spacing:0}.brand-text .sub{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}.brand-text .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(21,128,61,.12)}nav{display:flex;gap:4px;margin-left:12px}nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;font-size:13px;font-weight:500}nav a:hover{background:#f8fafc;color:var(--text)}nav a.active{background:var(--primary-bg);color:var(--primary)}
    main{max-width:1240px;margin:0 auto;padding:28px 20px 56px}.page-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}.page-head h1{font-size:22px;margin:0;font-weight:700}.page-head .actions{margin-left:auto;display:flex;align-items:center;gap:8px}.interval-control{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}.interval-control input{width:72px;height:36px;border:1px solid var(--border);border-radius:6px;padding:0 8px;color:var(--text);background:#fff}
    .btn{min-height:36px;padding:0 13px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--text)}.btn:hover{border-color:#aeb7c2}.btn.primary{border-color:var(--primary);background:var(--primary);color:#fff}.btn.danger{color:var(--danger)}
    .notice{display:none;margin-bottom:14px;padding:10px 12px;border-radius:5px;border:1px solid}.notice.show{display:block}.notice.ok{color:var(--ok);background:var(--ok-bg);border-color:#bbf7d0}.notice.error{color:var(--danger);background:var(--danger-bg);border-color:#fecaca}
    .connect{display:none;background:var(--panel);border-block:1px solid var(--border);margin:0 0 20px;padding:18px}.connect.open{display:block}.connect h2{font-size:15px;margin:0 0 15px}.form-grid{display:grid;grid-template-columns:180px minmax(260px,1fr) 180px;gap:12px}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.field input,.field select{width:100%;height:38px;border:1px solid #cbd3dc;border-radius:5px;background:#fff;padding:0 10px;outline:none}.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}.credentials{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px;margin-top:12px}.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
    .empty{padding:70px 20px;text-align:center;color:var(--muted);border-block:1px solid var(--border);background:#fff}.source-list{display:grid;gap:14px}.source{background:var(--panel);border:1px solid var(--border);border-radius:7px;overflow:hidden}.source-head{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid var(--border)}.source-title{min-width:0}.source-title strong{display:block;font-size:15px}.source-title span{display:block;color:var(--muted);font-size:12px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.source-actions{margin-left:auto;display:flex;gap:7px;flex:0 0 auto}
    .pill{display:inline-flex;align-items:center;height:24px;padding:0 8px;border-radius:12px;font-size:11px}.pill.ok{background:var(--ok-bg);color:var(--ok)}.pill.muted{background:#f2f4f7;color:var(--muted)}.pill.warn{background:var(--warn-bg);color:var(--warn)}
    .source-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}.metric{background:#fff;padding:12px 16px}.metric label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.metric span{font-weight:600;font-size:13px}.source-error{color:var(--danger);background:var(--danger-bg);padding:10px 16px;border-bottom:1px solid #fecaca}
    .table-wrap{overflow:auto;max-height:520px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:10px 14px;border-bottom:1px solid #edf0f3;white-space:nowrap}th{position:sticky;top:0;background:#fafbfc;color:var(--muted);font-size:11px;font-weight:600;z-index:1}th .sort-head{border:0;background:transparent;padding:0;color:inherit;font:inherit;cursor:pointer}th .sort-head:hover,th .sort-head.active{color:var(--primary)}th .sort-icon{margin-left:4px;color:var(--primary)}td.num,th.num{text-align:right}tbody tr:last-child td{border-bottom:0}.rules{color:var(--muted);font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis}.cooled{color:var(--warn)}.operation-progress{color:var(--primary);font-size:12px;margin-right:auto}.dialog-actions .operation-progress+.btn{margin-left:0}
    .modal{display:none;position:fixed;inset:0;z-index:20;background:rgba(15,23,42,.42);padding:24px;align-items:center;justify-content:center}.modal.open{display:flex}.dialog{width:min(820px,100%);max-height:min(760px,calc(100vh - 48px));display:flex;flex-direction:column;background:#fff;border-radius:7px;box-shadow:0 20px 50px rgba(15,23,42,.2);overflow:hidden}.dialog-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}.dialog-head h2{font-size:16px;margin:0}.dialog-head button{margin-left:auto}.group-tools{display:flex;align-items:end;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border)}.group-tools .field{width:min(280px,100%)}.group-table{overflow:auto;min-height:220px}.group-table table{min-width:620px}.group-table input[type=checkbox]{width:16px;height:16px}.dialog-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--border)}.dialog-actions .summary{margin-right:auto;color:var(--muted);font-size:12px}
    @media(max-width:760px){header{padding:0 14px}.form-grid,.credentials{grid-template-columns:1fr}.page-head{align-items:flex-start;flex-wrap:wrap}.page-head .actions{width:100%;margin-left:0}.source-head{align-items:flex-start;flex-wrap:wrap}.source-actions{width:100%;margin-left:0;flex-wrap:wrap}.source-meta{grid-template-columns:repeat(2,1fr)}main{padding-inline:14px}.modal{padding:10px}.group-tools{align-items:stretch;flex-direction:column}.group-tools .field{width:100%}.dialog-actions{flex-wrap:wrap}.dialog-actions .summary{width:100%;margin:0}}
  </style>
</head>
<body>
<header><strong>LLM Retry Proxy</strong><nav class="app-nav" aria-label="主导航"><a href="/stats">统计</a><a href="/logs">日志</a><a class="active" href="/admin/key-pools">号池</a></nav></header>
<main>
  <div class="page-head"><h1>号池管理</h1><div class="actions"><label class="interval-control">自动同步 <input id="syncInterval" type="number" min="0" max="86400" step="1"> 秒</label><button class="btn" id="saveInterval">保存周期</button><button class="btn" id="syncAll">立即同步</button><button class="btn primary" id="addSource">添加上游</button></div></div>
  <div class="notice" id="notice"></div>
  <section class="connect" id="connectPanel">
    <h2>上游连接</h2>
    <form id="connectForm">
      <div class="form-grid">
        <div class="field"><label for="adapter">适配器</label><select id="adapter" required></select></div>
        <div class="field"><label for="baseUrl">上游地址</label><input id="baseUrl" type="url" required></div>
        <div class="field"><label for="provider">Provider</label><input id="provider" required></div>
      </div>
      <div class="credentials" id="credentials"></div>
      <div class="form-actions"><button class="btn" type="button" id="cancelConnect">取消</button><button class="btn primary" type="submit" id="connectSubmit">连接并同步</button></div>
    </form>
  </section>
  <div id="content"><div class="empty">正在载入</div></div>
</main>
<div class="modal" id="groupModal" role="dialog" aria-modal="true" aria-labelledby="groupDialogTitle">
  <section class="dialog">
    <div class="dialog-head"><h2 id="groupDialogTitle">分组与 Key</h2><button class="btn" id="closeGroups" type="button">关闭</button></div>
    <div class="group-tools">
      <button class="btn" id="selectMissing" type="button">选择缺失分组</button>
      <button class="btn" id="selectAllGroups" type="button">全选</button>
    </div>
    <div class="group-table" id="groupTable"><div class="empty">正在载入</div></div>
    <div class="dialog-actions"><span class="summary" id="groupSummary"></span><span class="operation-progress" id="operationProgress" aria-live="polite"></span><button class="btn danger" id="clearSelected" type="button">清空选中分组</button><button class="btn" id="createMissing" type="button">一键补齐</button><button class="btn primary" id="createSelected" type="button">为选中分组创建 Key</button></div>
  </section>
</div>
<script>
const $=id=>document.getElementById(id);let state={adapters:[],sources:[],defaults:{}},activeSource='',groupCatalog=[],keySortMode='default',keySortDirection=1;
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function notice(message,type='ok'){const el=$('notice');el.textContent=message;el.className='notice show '+type;clearTimeout(el.timer);el.timer=setTimeout(()=>el.className='notice',5000)}
function fmtTime(v){if(!v)return '尚未同步';const d=new Date(v);return Number.isNaN(d.getTime())?v:d.toLocaleString()}
async function api(path,options={}){const response=await fetch('/admin/key-pools/api/'+path,{headers:{'Content-Type':'application/json'},...options});let data={};try{data=await response.json()}catch{}if(!response.ok)throw new Error(data.detail||data.message||('HTTP '+response.status));return data}
function renderCredentialFields(){const adapter=state.adapters.find(a=>a.name===$('adapter').value);$('credentials').innerHTML=(adapter?.credential_fields||[]).map(field=>`<div class="field"><label for="cred_${esc(field.name)}">${esc(field.label)}</label><input id="cred_${esc(field.name)}" data-credential="${esc(field.name)}" type="${esc(field.type||'text')}" required autocomplete="${field.type==='password'?'current-password':'off'}"></div>`).join('')}
function configureForm(){const adapters=state.adapters||[];$('adapter').innerHTML=adapters.map(a=>`<option value="${esc(a.name)}">${esc(a.label)}</option>`).join('');$('adapter').value=state.defaults?.adapter||adapters[0]?.name||'';$('baseUrl').value=state.defaults?.base_url||'';$('provider').value=state.defaults?.provider||'';renderCredentialFields()}
function supports(source,capability){const adapter=state.adapters.find(a=>a.name===source.adapter);return(adapter?.capabilities||[]).includes(capability)}
function sortHead(label,mode,num=false){const active=keySortMode===mode;const arrow=active?(keySortDirection===1?'↑':'↓'):'↕';return `<th${num?' class="num"':''}><button type="button" class="sort-head${active?' active':''}" data-sort="${mode}">${label}<span class="sort-icon">${arrow}</span></button></th>`}
function keyRows(keys){if(!keys.length)return '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:28px">暂无 Key</td></tr>';const ordered=[...keys];ordered.sort((a,b)=>{let result=0;if(keySortMode==='group'){result=String(a.group_name||'').localeCompare(String(b.group_name||''),'zh-CN')||String(a.label||'').localeCompare(String(b.label||''),'zh-CN')}if(keySortMode==='rate'){const ar=Number.parseFloat(a.sort),br=Number.parseFloat(b.sort);const av=Number.isFinite(ar)?ar:Number.POSITIVE_INFINITY,bv=Number.isFinite(br)?br:Number.POSITIVE_INFINITY;result=av-bv||String(a.group_name||'').localeCompare(String(b.group_name||''),'zh-CN')||String(a.label||'').localeCompare(String(b.label||''),'zh-CN')}return result*keySortDirection});return ordered.map(k=>{const rules=[...(k.models||[]),...(k.paths||[])].join('; ');return `<tr><td><strong>${esc(k.label)}</strong></td><td>${esc(k.key_masked)}</td><td>${esc(k.group_name||'-')}</td><td>${esc(k.platform||'-')}</td><td class="num">${esc(k.sort||'-')}</td><td class="rules" title="${esc(rules)}">${esc(rules||'-')}</td><td class="${k.cooled?'cooled':''}">${k.cooled?'熔断':'可用'}</td></tr>`}).join('')}
function render(){const sources=state.sources||[];if(!sources.length){$('content').innerHTML='<div class="empty">尚未配置上游连接</div>';return}$('content').innerHTML='<div class="source-list">'+sources.map(s=>`<section class="source"><div class="source-head"><div class="source-title"><strong>${esc(s.provider||s.adapter_label)}</strong><span>${esc(s.adapter_label)} · ${esc(s.base_url)}</span></div><span class="pill ${s.connected?'ok':'muted'}">${s.connected?'已连接':'已断开'}</span><div class="source-actions">${supports(s,'create_keys')?`<button class="btn" data-action="groups" data-id="${esc(s.id)}" ${s.connected?'':'disabled'}>选择分组</button><button class="btn" data-action="fill-missing" data-id="${esc(s.id)}" ${s.connected?'':'disabled'}>补齐缺失</button>`:''}${s.connected?`<button class="btn" data-action="sync" data-id="${esc(s.id)}">同步</button><button class="btn danger" data-action="disconnect" data-id="${esc(s.id)}">断开</button>`:`<button class="btn primary" data-action="reconnect" data-id="${esc(s.id)}">重新连接</button>`}</div></div><div class="source-meta"><div class="metric"><label>账号</label><span>${esc(s.account?.email||'-')}</span></div><div class="metric"><label>Key 数量</label><span>${s.key_count}</span></div><div class="metric"><label>同步周期</label><span>${state.interval>0?state.interval+' 秒':'手动'}</span></div><div class="metric"><label>最近同步</label><span>${esc(fmtTime(s.last_sync_at))}</span></div></div>${s.last_error?`<div class="source-error">${esc(s.last_error)}</div>`:''}<div class="table-wrap"><table><thead><tr><th>标识</th><th>Key</th>${sortHead('分组','group') }<th>平台</th>${sortHead('倍率','rate',true)}<th>本地规则</th><th>状态</th></tr></thead><tbody>${keyRows(s.keys||[])}</tbody></table></div></section>`).join('')+'</div>'}
function renderGroups(){const missing=groupCatalog.filter(g=>g.key_count===0).length;$('groupSummary').textContent=`${groupCatalog.length} 个分组，${missing} 个缺少 Key`;$('groupTable').innerHTML=groupCatalog.length?`<table><thead><tr><th style="width:44px"></th><th>分组</th><th>平台</th><th class="num">倍率</th><th class="num">Key</th><th class="num">有效</th></tr></thead><tbody>${groupCatalog.map(g=>`<tr><td><input type="checkbox" data-group-id="${esc(g.id)}" data-missing="${g.key_count===0?'1':'0'}" aria-label="选择 ${esc(g.name)}"></td><td><strong>${esc(g.name)}</strong>${g.key_count===0?' <span class="pill warn">缺失</span>':''}</td><td>${esc(g.platform||'-')}</td><td class="num">${esc(g.rate_multiplier||'-')}</td><td class="num">${g.key_count}</td><td class="num">${g.active_key_count}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">没有可用分组</div>'}
async function openGroups(sourceId){activeSource=sourceId;groupCatalog=[];$('groupModal').classList.add('open');$('groupTable').innerHTML='<div class="empty">正在载入</div>';$('groupSummary').textContent='';try{const data=await api('catalog?source_id='+encodeURIComponent(sourceId));groupCatalog=data.groups||[];renderGroups()}catch(e){$('groupTable').innerHTML='<div class="empty">载入失败</div>';notice(e.message,'error')}}
function setGroupBusy(busy,message=''){const modal=$('groupModal');modal.dataset.busy=busy?'1':'';modal.querySelectorAll('button,input').forEach(control=>{control.disabled=busy});$('operationProgress').textContent=message}
async function pollOperation(request){let settled=false;request.then(()=>{settled=true},()=>{settled=true});while(!settled){try{const current=await api('status');state=current;const source=(current.sources||[]).find(item=>item.id===activeSource),operation=source?.operation||{};if(operation.running)$('operationProgress').textContent=`处理中 ${operation.done||0}/${operation.total||'?'}，成功 ${operation.created||0}，失败 ${operation.failed||0}`;await new Promise(resolve=>setTimeout(resolve,500))}catch(e){await new Promise(resolve=>setTimeout(resolve,500))}}}
async function createKeys(onlyMissing,groupIds=[]){setGroupBusy(true,'准备创建...');const request=api('create-keys',{method:'POST',body:JSON.stringify({source_id:activeSource,group_ids:groupIds,only_missing:onlyMissing})});const poll=pollOperation(request);try{const result=await request;await poll;state=result.state;render();const made=result.creation?.created?.length||0,failed=result.creation?.errors?.length||0;$('groupModal').classList.remove('open');notice(failed?`已创建 ${made} 个，失败 ${failed} 个`:`已创建 ${made} 个 Key`,failed?'error':'ok')}catch(e){await poll;notice(e.message,'error')}finally{setGroupBusy(false)}}
async function clearKeys(groupIds=[]){const button=$('clearSelected');button.disabled=true;try{const result=await api('clear-keys',{method:'POST',body:JSON.stringify({source_id:activeSource,group_ids:groupIds})});state=result.state;render();const deleted=result.deletion?.deleted?.length||0,failed=result.deletion?.errors?.length||0;$('groupModal').classList.remove('open');notice(failed?`已清空 ${deleted} 个，失败 ${failed} 个`:`已清空 ${deleted} 个 Key`,failed?'error':'ok')}catch(e){notice(e.message,'error')}finally{button.disabled=false}}
function reconnectSource(sourceId){const source=(state.sources||[]).find(item=>item.id===sourceId);if(!source)return;configureForm();$('adapter').value=source.adapter;$('baseUrl').value=source.base_url;$('provider').value=source.provider||'';renderCredentialFields();$('connectPanel').classList.add('open');$('credentials').querySelector('input')?.focus()}
async function saveInterval(){const button=$('saveInterval');const value=Number($('syncInterval').value);if(!Number.isInteger(value)||value<0||value>86400){notice('同步周期必须是 0 到 86400 秒的整数','error');return}button.disabled=true;try{state=await api('settings',{method:'POST',body:JSON.stringify({interval:value})});$('syncInterval').value=state.interval;render();notice(value?'同步周期已保存':'已关闭自动同步')}catch(e){notice(e.message,'error')}finally{button.disabled=false}}
async function load(){try{state=await api('status');configureForm();$('syncInterval').value=state.interval;render()}catch(e){$('content').innerHTML='<div class="empty">载入失败</div>';notice(e.message,'error')}}
$('addSource').addEventListener('click',()=>{$('connectPanel').classList.add('open');$('baseUrl').focus()});$('cancelConnect').addEventListener('click',()=>{$('connectPanel').classList.remove('open');$('connectForm').reset();configureForm()});$('adapter').addEventListener('change',renderCredentialFields);
$('connectForm').addEventListener('submit',async e=>{e.preventDefault();const button=$('connectSubmit');button.disabled=true;const credentials={};document.querySelectorAll('[data-credential]').forEach(input=>credentials[input.dataset.credential]=input.value);try{state=await api('connect',{method:'POST',body:JSON.stringify({adapter:$('adapter').value,base_url:$('baseUrl').value,provider:$('provider').value,credentials})});$('connectPanel').classList.remove('open');$('connectForm').reset();configureForm();render();notice('上游已连接并同步')}catch(err){notice(err.message,'error')}finally{button.disabled=false}});
$('syncAll').addEventListener('click',async()=>{const button=$('syncAll');button.disabled=true;try{state=await api('sync',{method:'POST',body:'{}'});render();notice('同步完成')}catch(e){notice(e.message,'error');await load()}finally{button.disabled=false}});
$('content').addEventListener('click',async e=>{const button=e.target.closest('button[data-action]');if(!button)return;const action=button.dataset.action;if(action==='groups'){openGroups(button.dataset.id);return}if(action==='reconnect'){reconnectSource(button.dataset.id);return}if(action==='fill-missing'){button.disabled=true;activeSource=button.dataset.id;await openGroups(activeSource);await createKeys(true);button.disabled=false;return}button.disabled=true;try{state=await api(action,{method:'POST',body:JSON.stringify({source_id:button.dataset.id})});await load();notice(action==='sync'?'同步完成':'连接已断开')}catch(err){notice(err.message,'error');button.disabled=false}});
$('saveInterval').addEventListener('click',saveInterval);
$('content').addEventListener('click',e=>{const head=e.target.closest('button[data-sort]');if(!head)return;const mode=head.dataset.sort;if(keySortMode===mode)keySortDirection*=-1;else{keySortMode=mode;keySortDirection=1}render()});
$('closeGroups').addEventListener('click',()=>$('groupModal').classList.remove('open'));
$('groupModal').addEventListener('click',e=>{if(e.target===$('groupModal')&&!$('groupModal').dataset.busy)$('groupModal').classList.remove('open')});
$('selectMissing').addEventListener('click',()=>document.querySelectorAll('[data-group-id]').forEach(input=>input.checked=input.dataset.missing==='1'));
$('selectAllGroups').addEventListener('click',()=>document.querySelectorAll('[data-group-id]').forEach(input=>input.checked=true));
$('createMissing').addEventListener('click',()=>createKeys(true));
$('clearSelected').addEventListener('click',()=>{const ids=[...document.querySelectorAll('[data-group-id]:checked')].map(input=>input.dataset.groupId);if(!ids.length){notice('请选择至少一个分组','error');return}if(confirm(`确定清空选中的 ${ids.length} 个分组中的全部 Key 吗？此操作会删除上游 Key，无法撤销。`))clearKeys(ids)});
$('createSelected').addEventListener('click',()=>{const ids=[...document.querySelectorAll('[data-group-id]:checked')].map(input=>input.dataset.groupId);if(!ids.length){notice('请选择至少一个分组','error');return}createKeys(false,ids)});
load();
</script>
</body>
</html>
